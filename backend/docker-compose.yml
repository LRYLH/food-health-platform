services:
    mysql:
        image: mysql:8.0
        container_name: food_health_mysql
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-food_health_platform}
        volumes:
            - ./mysql-data:/var/lib/mysql
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:alpine
        container_name: food_health_redis
        ports:
            - "6379:6379"
        volumes:
            - ./redis-data:/data
        restart: always

    app:
        build: .
        container_name: food_health_app
        ports:
            - "8000:8000"
        environment:
            - MILVUS_URI=http://milvus:19530
        env_file:
            - .env
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        volumes:
            - ./app:/app/app
            - ./uploads:/app/uploads
            - ./model_io:/app/model_io
        restart: always

    
    algo_service:
        build: .
        container_name: food_health_algo
        ports:
            - "8001:8001"
        environment:
            - MILVUS_URI=http://milvus:19530
        env_file:
            - .env
        depends_on:
            - milvus
        volumes:
            
            - ./app:/app/app
            - ./model_io:/app/model_io
        command: uvicorn app.algorithm.rag_engine.retriever:app --host 0.0.0.0 --port 8001
        restart: always
    

    etcd:
        image: quay.io/coreos/etcd:v3.5.10
        container_name: food_health_etcd
        environment:
            ETCD_AUTO_COMPACTION_MODE: revision
            ETCD_AUTO_COMPACTION_RETENTION: "1000"
            ETCD_QUOTA_BACKEND_BYTES: "4294967296"
            ETCD_SNAPSHOT_COUNT: "50000"
        volumes:
            - ./milvus-data/etcd:/etcd
        ports:
            - "2379:2379"
        command: etcd --advertise-client-urls=http://etcd:2379 --listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
        restart: always

    minio:
        image: minio/minio:RELEASE.2023-03-20T20-16-18Z
        container_name: food_health_minio
        environment:
            MINIO_ACCESS_KEY: minioadmin
            MINIO_SECRET_KEY: minioadmin
        volumes:
            - ./milvus-data/minio:/minio_data
        ports:
            - "9000:9000"
            - "9001:9001"
        command: minio server /minio_data --console-address ":9001"
        restart: always

    milvus:
        image: milvusdb/milvus:v2.4.0
        container_name: food_health_milvus
        command: ["milvus", "run", "standalone"]
        environment:
            ETCD_ENDPOINTS: etcd:2379
            MINIO_ADDRESS: minio:9000
        volumes:
            - ./milvus-data/milvus:/var/lib/milvus
        ports:
            - "19530:19530"
        depends_on:
            - etcd
            - minio
        restart: always
        deploy:
            resources:
                limits:
                    memory: 4G
                reservations:
                    memory: 1G