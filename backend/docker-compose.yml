services:
    mysql:
        image: mysql:8.0
        container_name: food_health_mysql
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
            MYSQL_DATABASE: ${MYSQL_DATABASE:-food_health_platform}
        volumes:
            - ./mysql-data:/var/lib/mysql
        restart: always
        healthcheck:
            test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root -p$${MYSQL_ROOT_PASSWORD}"]
            interval: 10s
            timeout: 5s
            retries: 5

    redis:
        image: redis:alpine
        container_name: food_health_redis
        ports:
            - "6379:6379"
        volumes:
            - ./redis-data:/data
        restart: always

    app:
        build: .
        container_name: food_health_app
        ports:
            - "8000:8000"
        env_file:
            - .env
        depends_on:
            mysql:
                condition: service_healthy
            redis:
                condition: service_started
        volumes:
            - ./app:/app/app
            - ./uploads:/app/uploads
        restart: always
